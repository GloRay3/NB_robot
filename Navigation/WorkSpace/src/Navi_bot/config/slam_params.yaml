slam_toolbox:
  ros__parameters:
    use_sim_time: true
    mode: mapping

    # 坐标系
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint

    # 雷达话题
    scan_topic: /scan

    # 地图分辨率
    resolution: 0.05
    max_laser_range: 12.0
    map_update_interval: 2.0
    transform_publish_period: 0.02

